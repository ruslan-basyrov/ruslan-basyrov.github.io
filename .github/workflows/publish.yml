on:
  workflow_dispatch:
  push:
    branches: main

name: Quarto Publish

# Required permissions for GitHub Pages direct deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one concurrent deployment to prevent conflicts
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'

      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2
        env:
          RENV_CONFIG_REPOS_OVERRIDE: "https://packagemanager.posit.co/cran/__linux__/jammy/latest"

      # The Quarto extension is https://github.com/ruslan-basyrov/acuity
      - name: Add Quarto extension
        run: quarto add ruslan-basyrov/acuity --no-prompt

      # Renders both HTML and Typst (PDF) into the _acuity folder
      - name: Render Quarto Project
        run: quarto render

      # Packages the _acuity output directory and uploads it to GitHub infrastructure
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _acuity

      # Deploys the artifact to your live GitHub Pages URL
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
